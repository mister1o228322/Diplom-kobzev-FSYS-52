---
- name: Install Zabbix Server
  hosts: zabbix
  become: yes
  vars:
    db_password: "zabbix_pass123"

  tasks:
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Start PostgreSQL
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Create Zabbix DB and user
      shell: |
        sudo -u postgres psql -c "CREATE USER zabbix WITH PASSWORD '{{ db_password }}';"
        sudo -u postgres psql -c "CREATE DATABASE zabbix OWNER zabbix;"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE zabbix TO zabbix;"

    - name: Download Zabbix repository
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.0+ubuntu22.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Install Zabbix repo
      apt:
        deb: /tmp/zabbix-release.deb
      ignore_errors: yes
    - name: Install Zabbix Server
      apt:
        update_cache: yes
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - php8.1-pgsql
          - zabbix-agent2
          - nginx
        state: present

    - name: Import Zabbix schema
      shell: zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | sudo -u zabbix psql zabbix

    - name: Configure Zabbix Server
      lineinfile:
        path: /etc/zabbix/zabbix_server.conf
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "DBHost", value: "localhost" }
        - { key: "DBName", value: "zabbix" }
        - { key: "DBUser", value: "zabbix" }
        - { key: "DBPassword", value: "{{ db_password }}" }

    - name: Configure Zabbix PHP
      lineinfile:
        path: /etc/zabbix/nginx.conf
        regexp: "listen 80;"
        line: "listen 8080;"

    - name: Start services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - zabbix-server
        - zabbix-agent2
        - nginx
        - php8.1-fpm
