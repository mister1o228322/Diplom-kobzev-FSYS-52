---
- name: Install Elasticsearch
  hosts: elasticsearch
  become: yes
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: yes
    - name: Run Elasticsearch container
      docker_container:
        name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.23
        state: started
        restart_policy: always
        ports:
          - "9200:9200"
        env:
          discovery.type: "single-node"
          xpack.security.enabled: "false"
